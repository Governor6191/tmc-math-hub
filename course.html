<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    try {
      var t = localStorage.getItem('tmc.v1.theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var m = document.querySelector('meta[name="theme-color"]');
    } catch (e) {}
  </script>
  <meta name="theme-color" content="#0f1f1c">
  <title>Course - TMC Math Hub</title>
  <meta name="description" content="Slides, textbooks, practice sheets and video lessons for this course.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <header class="chrome" data-chrome="header"></header>
  <main class="wrap" id="course"><p class="hint">Loading course…</p></main>
  <footer class="chrome-foot" data-chrome="footer"></footer>
  <script type="module" src="js/course.js"></script>
</body>
</html>
