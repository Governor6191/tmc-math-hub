<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    try {
      var t = localStorage.getItem('tmc.v1.theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.classList.add('is-js');
      var m = document.querySelector('meta[name="theme-color"]');
    } catch (e) {}
  </script>
  <meta name="theme-color" content="#0a1613">
  <title>TMC Math Hub - KNUST Mathematics resources, Year 1 to 4</title>
  <meta name="description" content="Slides, practice questions, mock exams and in-browser coding labs for every KNUST Mathematics course, Year 1 to Year 4. Free, no login.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <header class="chrome" data-chrome="header"></header>
  <main class="wrap">
    <section class="hero">
      <h1>The KNUST maths library, <span class="mark">open all night.</span></h1>
      <p>Every course's slides and textbooks from Year&nbsp;1 to final year, plus thousands of
      practice questions with worked solutions, Moodle-style mock exams and in-browser coding
      labs. Free, no login. Pick your year.</p>
    </section>
    <p id="library-status" class="hint" aria-live="polite">Loading the years…</p>
    <div id="library"></div>
  </main>
  <footer class="chrome-foot" data-chrome="footer"></footer>
  <script type="module" src="js/home.js"></script>
</body>
</html>
