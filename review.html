<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    try {
      var t = localStorage.getItem('tmc.v1.theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.classList.add('is-js');
      var m = document.querySelector('meta[name="theme-color"]');
    } catch (e) {}
  </script>
  <meta name="theme-color" content="#0a1613">
  <meta name="robots" content="noindex">
  <title>Bank review - TMC Math Hub</title>
  <meta name="description" content="Internal review page for draft question banks.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="css/site.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <header class="chrome" data-chrome="header"></header>
  <main class="wrap" id="review"><p class="hint">Loading draft bank…</p></main>
  <footer class="chrome-foot" data-chrome="footer"></footer>
  <script type="module" src="js/review.js"></script>
</body>
</html>
